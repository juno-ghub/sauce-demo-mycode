[pytest]
minversion = 7.0
addopts = 
    -v
    --strict-markers
    --tb=short
    --html=reports/report.html
    --self-contained-html
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    smoke: Run smoke tests
    sanity: Run sanity tests
    regression: Run regression tests
    positive: Run positive test cases
    negative: Run negative test cases
    login: Tests for login functionality
    product: Tests for product functionality
    cart: Tests for cart functionality
    checkout: Tests for checkout functionality
